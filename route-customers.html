<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Route 504 — Customer Directory</title>
<style>
  :root {
    --primary-red:  #C8102E;
    --dark-red:     #8A1538;
    --coffee-brown: #4A2C1D;
    --gold:         #C8A951;
    --text-dark:    #222222;
    --text-mid:     #555555;
    --light-gray:   #F7F7F7;
    --border:       #E5E5E5;
    --white:        #FFFFFF;
    --green:        #1a9e6e;
    --amber:        #d97706;
    --card-shadow:  0 2px 16px rgba(0,0,0,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--light-gray); color:var(--text-dark); padding-bottom:80px; }

  /* NAV */
  .nav { background:white; border-bottom:3px solid var(--primary-red); display:flex; justify-content:space-around; padding:0; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,.12); }
  .nav a { color:#666; text-decoration:none; font-size:11px; font-weight:700; text-align:center; display:flex; flex-direction:column; align-items:center; gap:2px; padding:10px 20px 8px; border-bottom:3px solid transparent; margin-bottom:-3px; transition:all .2s; letter-spacing:.5px; text-transform:uppercase; }
  .nav a .ni { font-size:18px; }
  .nav a.active { color:var(--primary-red); border-bottom-color:var(--primary-red); }
  .nav a:hover   { color:var(--primary-red); }

  /* PAGE HEADER */
  .page-header { background:white; padding:16px 18px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  .page-header img { height:46px; width:auto; flex-shrink:0; }
  .page-header-text h1 { font-size:18px; font-weight:900; color:var(--text-dark); letter-spacing:-.3px; }
  .page-header-text p  { font-size:12px; color:var(--text-mid); margin-top:2px; }

  /* PROGRESS */
  .prog-bar-wrap { background:white; padding:10px 18px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .prog-bg    { flex:1; height:6px; background:#eee; border-radius:6px; overflow:hidden; }
  .prog-fill  { height:100%; background:var(--primary-red); border-radius:6px; transition:width .4s ease; width:0; }
  .prog-lbl   { font-size:12px; font-weight:800; color:var(--text-mid); white-space:nowrap; }
  .prog-badge { background:var(--primary-red); color:white; font-size:11px; font-weight:800; padding:3px 10px; border-radius:20px; white-space:nowrap; }

  /* SEARCH */
  .searchbar { background:white; padding:10px 14px; border-bottom:1px solid var(--border); display:flex; gap:8px; position:sticky; top:61px; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .sw { position:relative; flex:1; }
  .si { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; color:#aaa; }
  .searchbar input { width:100%; padding:9px 11px 9px 34px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; color:var(--text-dark); background:var(--light-gray); transition:all .2s; }
  .searchbar input:focus { outline:none; border-color:var(--primary-red); background:white; box-shadow:0 0 0 3px rgba(200,16,46,.08); }
  .fbtn { padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; background:white; font-size:12px; font-weight:700; color:var(--text-mid); cursor:pointer; white-space:nowrap; transition:all .15s; }
  .fbtn.on { background:var(--primary-red); border-color:var(--primary-red); color:white; }

  /* TABS */
  .tabs { display:flex; gap:6px; padding:10px 14px 8px; overflow-x:auto; scrollbar-width:none; background:white; border-bottom:1px solid var(--border); }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; border:1.5px solid var(--border); background:white; color:var(--text-mid); transition:all .15s; flex-shrink:0; }
  .tab.on { background:var(--primary-red); border-color:var(--primary-red); color:white; }

  /* CARDS */
  .cards { padding:12px 12px 0; }
  .card { background:white; border-radius:12px; margin-bottom:10px; box-shadow:var(--card-shadow); border:1px solid var(--border); overflow:hidden; transition:box-shadow .2s; }
  .card.complete { border-color:var(--green); box-shadow:0 2px 12px rgba(26,158,110,.15); }
  .card.partial  { border-color:var(--amber); box-shadow:0 2px 8px rgba(217,119,6,.12); }

  .card-top { display:flex; align-items:center; padding:12px 14px; gap:10px; cursor:pointer; user-select:none; }
  .dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; flex-shrink:0; border:2px solid var(--border); background:var(--light-gray); color:transparent; transition:all .2s; }
  .card.complete .dot { background:var(--green);  border-color:var(--green);  color:white; }
  .card.partial  .dot { background:var(--amber);  border-color:var(--amber);  color:white; }

  .ci { flex:1; min-width:0; }
  .cn { font-size:13px; font-weight:800; color:var(--text-dark); line-height:1.3; }
  .cd { font-size:10px; color:var(--text-mid); margin-top:2px; font-weight:500; }

  .tag-wrap { display:flex; flex-direction:column; gap:3px; align-items:flex-end; flex-shrink:0; }
  .tag-num  { font-size:11px; font-weight:800; color:var(--dark-red); background:#fdf2f4; padding:2px 8px; border-radius:5px; }
  .tag-miss { font-size:10px; font-weight:700; color:#999; background:#f5f5f5; padding:2px 8px; border-radius:5px; }

  .fields { padding:0 14px 14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; border-top:1px solid var(--border); margin:0 14px; padding-top:12px; }
  .fields.hide { display:none; }
  .fg { display:flex; flex-direction:column; gap:4px; }
  .fg.full { grid-column:1/-1; }
  .fg label { font-size:9px; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:.8px; }
  .fg input { padding:8px 10px; border:1.5px solid var(--border); border-radius:7px; font-size:14px; color:var(--text-dark); background:var(--light-gray); transition:all .2s; width:100%; }
  .fg input:focus { outline:none; border-color:var(--primary-red); background:white; box-shadow:0 0 0 3px rgba(200,16,46,.08); }
  .fg input.ok { border-color:var(--green); background:#f0fdf8; }

  /* EMPTY */
  .empty { text-align:center; padding:56px 24px; color:#bbb; }
  .empty .ei { font-size:44px; margin-bottom:10px; }
  .empty h3  { font-size:16px; font-weight:800; color:var(--text-mid); margin-bottom:5px; }

  /* BOTTOM BAR */
  .bar { position:fixed; bottom:0; left:0; right:0; background:white; border-top:2px solid var(--border); padding:10px 16px; display:flex; gap:10px; align-items:center; box-shadow:0 -4px 16px rgba(0,0,0,.08); }
  .bstat { font-size:10px; font-weight:700; color:var(--text-mid); line-height:1.4; text-transform:uppercase; letter-spacing:.4px; }
  .bstat span { color:var(--text-dark); font-size:18px; font-weight:900; display:block; line-height:1; }
  .bbtns { display:flex; gap:8px; flex:1; justify-content:flex-end; }
  .ba { padding:9px 16px; border:none; border-radius:8px; font-size:12px; font-weight:800; cursor:pointer; letter-spacing:.3px; }
  .ba:active { opacity:.8; }
  .bcopy { background:var(--light-gray); color:var(--text-dark); border:1.5px solid var(--border); }
  .bsend { background:var(--primary-red); color:white; }

  /* TOAST */
  .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-70px); background:var(--text-dark); color:white; padding:9px 18px; border-radius:30px; font-size:13px; font-weight:700; z-index:999; transition:transform .3s; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.25); }
  .toast.show { transform:translateX(-50%) translateY(0); }
  @media(max-width:360px){ .fields{grid-template-columns:1fr;} .fg.full{grid-column:1;} }

  /* UPLOAD SECTION */
  .upload-zone { border-top:1px solid var(--border); padding-top:10px; margin-top:8px; }
  .upload-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .upload-date { border:1px solid var(--border); border-radius:6px; padding:5px 8px; font-size:.8rem; color:var(--text); background:var(--bg); cursor:pointer; }
  .upload-label { cursor:pointer; background:var(--primary-red); color:#fff; border-radius:6px; padding:5px 14px; font-size:.8rem; font-weight:700; white-space:nowrap; user-select:none; }
  .upload-label input[type=file] { display:none; }
  .upload-preview-row { display:none; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .upload-fname { font-size:.75rem; color:var(--muted); font-family:monospace; word-break:break-all; flex:1; min-width:0; }
  .upload-submit { background:#1a7f37; color:#fff; border:none; border-radius:6px; padding:5px 14px; font-size:.8rem; font-weight:700; cursor:pointer; white-space:nowrap; }
  .upload-submit:disabled { opacity:.55; cursor:not-allowed; }
  .upload-status { font-size:.76rem; margin-top:4px; min-height:1em; }
  .upload-ok { color:#1a7f37; }
  .upload-err { color:#c00; }
</style>
</head>

// Load saved overrides (keyed by customer name)
let saved = JSON.parse(localStorage.getItem(SK) || '{}');

// Migrate old v1 data if present (index-keyed → name-keyed)
(function migrateV1() {
  const v1 = JSON.parse(localStorage.getItem('r504dir_v1') || '{}');
  if (!Object.keys(v1).length) return;
  let migrated = 0;
  Object.keys(v1).forEach(idx => {
    const c = customers[parseInt(idx)];
    if (!c) return;
    const key = c.name;
    if (!saved[key]) { saved[key] = v1[idx]; migrated++; }
  });
  if (migrated) {
    localStorage.setItem(SK, JSON.stringify(saved));
    console.log('Migrated ' + migrated + ' entries from v1');
  }
})();

// Get effective value: localStorage override first, then CSV data
function effVal(name, field) {
  const ov = saved[name];
  if (ov && ov[field] !== undefined && ov[field] !== '') return ov[field];
  const c = customers.find(x => x.name === name);
  return c ? (c[field] || '') : '';
}

function isComplete(name) {
  return !!(effVal(name,'contact') && effVal(name,'email') && effVal(name,'phone'));
}
function isPartial(name) {
  return !isComplete(name) && !!(effVal(name,'contact') || effVal(name,'email') || effVal(name,'phone') || effVal(name,'num'));
}

function stats() {
  let c=0, p=0;
  customers.forEach(cu => {
    if (isComplete(cu.name)) c++;
    else if (isPartial(cu.name)) p++;
  });
  return {c, p, e: TOTAL - c - p};
}

function updateHeader() {
  const s = stats();
  document.getElementById('sc').textContent = s.c;
  document.getElementById('sp').textContent = s.p;
  document.getElementById('se').textContent = s.e;
  const pct = (s.c / TOTAL * 100).toFixed(0);
  document.getElementById('pfill').style.width = pct + '%';
  document.getElementById('plbl').textContent = pct + '% complete';
  document.getElementById('badge').textContent = s.c + ' / ' + TOTAL;
}

function safeIdFor(name) {
  return String(name).replace(/[^a-zA-Z0-9]/g, '_');
}

function save(name, field, val) {
  if (!saved[name]) saved[name] = {};
  saved[name][field] = val.trim();
  localStorage.setItem(SK, JSON.stringify(saved));
  const cardEl = document.getElementById('card-' + safeIdFor(name));
  if (cardEl) refreshCardState(cardEl, name);
  updateHeader();
}

function refreshCardState(cardEl, name) {
  const comp = isComplete(name), part = isPartial(name);
  cardEl.className = 'card' + (comp ? ' complete' : part ? ' partial' : '');
  const dot = cardEl.querySelector('.dot');
  if (dot) dot.textContent = comp ? '✓' : part ? '·' : '';
  ['num','contact','email','phone'].forEach(f => {
    const inp = cardEl.querySelector('[data-f="' + f + '"]');
    if (inp) inp.className = effVal(name, f) ? 'ok' : '';
  });
}

function toggleCard(name) {
  const f = document.getElementById('fields-' + safeIdFor(name));
  if (f) f.classList.toggle('hide');
}

let needOnly = false, dayFilter = '';

function setDay(d) {
  dayFilter = d;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + (d || 'all')).classList.add('on');
  render();
}

function toggleNeed() {
  needOnly = !needOnly;
  document.getElementById('fbtn').classList.toggle('on', needOnly);
  render();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateUploadPreview(card) {
  const name = card.getAttribute('data-name');
  const fileInput = card.querySelector('.upload-file');
  const dateInput = card.querySelector('.upload-date');
  const previewRow = card.querySelector('.upload-preview-row');
  const fname = card.querySelector('.upload-fname');
  const status = card.querySelector('.upload-status');
  if (status) { status.textContent = ''; status.className = 'upload-status'; }
  if (!fileInput || !fileInput.files.length) { if (previewRow) previewRow.style.display = 'none'; return; }
  const date = dateInput.value || new Date().toISOString().slice(0,10);
  fname.textContent = date + ' ' + name + '.pdf';
  previewRow.style.display = 'flex';
}

async function doUpload(card) {
  if (!UPLOAD_URL) { toast('Set UPLOAD_URL in the HTML first'); return; }
  const name = card.getAttribute('data-name');
  const fileInput = card.querySelector('.upload-file');
  const dateInput = card.querySelector('.upload-date');
  const btn = card.querySelector('.upload-submit');
  const status = card.querySelector('.upload-status');
  if (!fileInput || !fileInput.files.length) return;
  const file = fileInput.files[0];
  const date = dateInput.value || new Date().toISOString().slice(0,10);
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  status.textContent = '';
  status.className = 'upload-status';
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const resp = await fetch(UPLOAD_URL, {
      method: 'POST',
      body: JSON.stringify({ customerName: name, date, fileBase64: b64 }),
    });
    const result = await resp.json();
    if (result.ok) {
      status.textContent = '✓ ' + result.filename;
      status.className = 'upload-status upload-ok';
      fileInput.value = '';
      card.querySelector('.upload-preview-row').style.display = 'none';
    } else {
      status.textContent = '✗ ' + result.error;
      status.className = 'upload-status upload-err';
    }
  } catch(err) {
    status.textContent = '✗ ' + err.message;
    status.className = 'upload-status upload-err';
  }
  btn.disabled = false;
  btn.textContent = '↑ Upload to Drive';
}

function render() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const today = new Date().toISOString().slice(0,10);
  let html = '<div class="cards">', shown = 0;

  customers.forEach(c => {
    const name = c.name;
    if (needOnly && isComplete(name)) return;
    if (dayFilter && !c.days.includes('DAY ' + dayFilter)) return;
    if (q && !name.toLowerCase().includes(q) && !c.days.toLowerCase().includes(q)) return;
    shown++;

    const comp = isComplete(name), part = isPartial(name);
    const cls  = 'card' + (comp ? ' complete' : part ? ' partial' : '');
    const dot  = comp ? '✓' : part ? '·' : '';
    const numV = effVal(name, 'num');
    const numTag = numV
      ? '<div class="tag-num">' + esc(numV) + '</div>'
      : '<div class="tag-miss">No #</div>';
    const safeId = esc(name).replace(/[^a-zA-Z0-9]/g, '_');

    const nameAttr = esc(name);

    html += '<div class="' + cls + '" id="card-' + safeId + '" data-name="' + nameAttr + '">';
    html += '<div class="card-top" data-toggle="1">';
    html += '<div class="dot">' + dot + '</div>';
    html += '<div class="ci"><div class="cn">' + esc(name) + '</div><div class="cd">' + esc(c.days) + '</div></div>';
    html += '<div class="tag-wrap">' + numTag + '</div></div>';

    const fHide = comp ? ' hide' : '';
    html += '<div class="fields' + fHide + '" id="fields-' + safeId + '">';

    const fields = [
      ['num',     'Customer #',     'tel',   'inputmode="numeric" placeholder="1xxxxxx"'],
      ['phone',   'Phone',          'tel',   'placeholder="(555) 555-5555"'],
      ['contact', 'Contact Person', 'text',  'placeholder="Name"', 'full'],
      ['email',   'Email',          'email', 'placeholder="email@example.com"', 'full'],
    ];

    fields.forEach(([f, lbl, type, attrs, fullCls]) => {
      const val = effVal(name, f);
      const ok  = val ? ' class="ok"' : '';
      html += '<div class="fg' + (fullCls ? ' full' : '') + '">';
      html += '<label>' + lbl + '</label>';
      html += '<input type="' + type + '" ' + attrs + ' data-f="' + f + '"' + ok + ' value="' + esc(val) + '">';
      html += '</div>';
    });

    html += '<div class="upload-zone">';
    html += '<div class="upload-row">';
    html += '<input type="date" class="upload-date" value="' + today + '">';
    html += '<label class="upload-label">📎 Choose PDF<input type="file" accept=".pdf,application/pdf" class="upload-file"></label>';
    html += '</div>';
    html += '<div class="upload-preview-row">';
    html += '<span class="upload-fname"></span>';
    html += '<button class="upload-submit">↑ Upload to Drive</button>';
    html += '</div>';
    html += '<div class="upload-status"></div>';
    html += '</div>';
    html += '</div></div>';
  });

  if (!shown) html += '<div class="empty"><div class="ei">' + (q ? '🔍' : '🎉') + '</div><h3>' + (q ? 'No results' : 'All done!') + '</h3></div>';
  html += '</div>';
  document.getElementById('list').innerHTML = html;
}

function buildCSV() {
  const lines = ['"CUSTOMER NAME","CUSTOMER NUMBER","CONTACT PERSON","EMAIL","PHONE"'];
  customers.forEach(c => {
    const num = effVal(c.name,'num'), contact = effVal(c.name,'contact');
    const email = effVal(c.name,'email'), phone = effVal(c.name,'phone');
    if (num || contact || email || phone)
      lines.push([c.name, num, contact, email, phone].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','));
  });
  return lines.join('\n');
}

function copyCSV() {
  navigator.clipboard.writeText(buildCSV()).then(() => toast('Copied!'));
}

function emailMe() {
  const s = stats();
  if (s.c + s.p === 0) { toast('Fill in at least one customer first'); return; }
  const body = encodeURIComponent('Route 504 Directory Updates\n\n' + buildCSV());
  window.location.href = 'mailto:caleb@eaglerockstays.com?subject=Route%20504%20Directory%20Updates&body=' + body;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// Event delegation: catches every input/click without inline handlers
(function bindListEvents() {
  const list = document.getElementById('list');
  if (!list) return;
  list.addEventListener('input', function(e) {
    const inp = e.target;
    if (!inp || inp.tagName !== 'INPUT') return;
    const field = inp.getAttribute('data-f');
    if (!field) return;
    const card = inp.closest('[data-name]');
    if (!card) return;
    save(card.getAttribute('data-name'), field, inp.value);
  });
  list.addEventListener('click', function(e) {
    const top = e.target.closest('[data-toggle]');
    if (!top) return;
    const card = top.closest('[data-name]');
    if (!card) return;
    toggleCard(card.getAttribute('data-name'));
  });
  list.addEventListener('change', function(e) {
    if (!e.target.classList.contains('upload-file') && !e.target.classList.contains('upload-date')) return;
    const card = e.target.closest('[data-name]');
    if (card) updateUploadPreview(card);
  });
  list.addEventListener('click', function(e) {
    const btn = e.target.closest('.upload-submit');
    if (!btn) return;
    const card = btn.closest('[data-name]');
    if (card) doUpload(card);
  });
})();

render();
updateHeader();
</script>
