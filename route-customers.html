<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Route 504 — Customer Lookup</title>
<style>
  :root {
    --navy: #0d1b4b;
    --blue: #1a3a8f;
    --gold: #f0b429;
    --green: #10b981;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a202c;
    --muted: #64748b;
    --border: #e2e8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(13,27,75,0.35);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  header h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.3px; }
  header .subtitle { font-size: 12px; opacity: 0.7; margin-top: 2px; font-weight: 500; }

  .header-badge {
    background: var(--gold);
    color: var(--navy);
    font-size: 13px;
    font-weight: 900;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .progress-wrap { display: flex; align-items: center; gap: 10px; }

  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label { font-size: 12px; font-weight: 700; opacity: 0.85; white-space: nowrap; }

  /* ── Search ── */
  .search-bar {
    background: white;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    position: sticky;
    top: 110px;
    z-index: 99;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .search-wrap { position: relative; flex: 1; }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    pointer-events: none;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }

  .search-bar input:focus {
    outline: none;
    border-color: var(--blue);
    background: white;
  }

  .filter-btn {
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

  /* ── Cards ── */
  .cards { padding: 12px 12px 0; }

  .card {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .card.is-done {
    box-shadow: 0 0 0 2px var(--green), 0 2px 8px rgba(16,185,129,0.12);
  }

  .card-top {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .card-status {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.2s;
    background: var(--bg);
    color: white;
    font-weight: 900;
  }

  .card.is-done .card-status { background: var(--green); border-color: var(--green); }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: 0.2px;
  }

  .card-days { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 500; }

  .card-num-preview {
    font-size: 13px;
    font-weight: 800;
    color: var(--green);
    background: #d1fae5;
    padding: 3px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .card-fields {
    padding: 0 16px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-top: 1px solid var(--border);
    margin: 0 16px;
    padding-top: 12px;
  }

  .card-fields.collapsed { display: none; }

  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group.full { grid-column: 1 / -1; }

  .field-group label {
    font-size: 10px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  .field-group input {
    padding: 9px 11px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    transition: all 0.2s;
    width: 100%;
  }

  .field-group input:focus {
    outline: none;
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 3px rgba(26,58,143,0.1);
  }

  .field-group input.filled { border-color: var(--green); background: #f0fdf4; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty h3 { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--navy);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  }

  .bottom-stat { color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 700; white-space: nowrap; line-height: 1.3; }
  .bottom-stat span { color: var(--gold); font-size: 18px; font-weight: 900; display: block; }

  .bottom-btns { display: flex; gap: 8px; flex: 1; justify-content: flex-end; }

  .btn-action {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-action:active { opacity: 0.75; }
  .btn-copy { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); }
  .btn-send { background: var(--gold); color: var(--navy); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--navy);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 700;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 380px) {
    .card-fields { grid-template-columns: 1fr; }
    .field-group.full { grid-column: 1; }
  }
</style>
</head>

const STORAGE_KEY = 'route504_v2';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let showOnlyRemaining = false;

function countFilled() {
  return Object.values(state).filter(d => d.cust_num && d.cust_num.trim()).length;
}

function updateStats() {
  const filled = countFilled();
  const left = TOTAL - filled;
  const pct = (filled / TOTAL * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = filled + ' / ' + TOTAL;
  document.getElementById('remaining-badge').textContent = left + ' left';
  document.getElementById('stat-filled').textContent = filled;
  document.getElementById('stat-left').textContent = left;
}

function saveField(i, field, val) {
  if (!state[i]) state[i] = {};
  state[i][field] = val.trim();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const d = state[i];
  const card = document.getElementById('c' + i);
  if (!card) return;
  const done = !!(d.cust_num && d.cust_num.trim());
  card.className = 'card' + (done ? ' is-done' : '');
  card.querySelector('.card-status').textContent = done ? '✓' : '';
  const preview = card.querySelector('.card-num-preview');
  if (preview) preview.textContent = d.cust_num || '';
  const inp = card.querySelector('input[data-field="cust_num"]');
  if (inp) inp.className = d.cust_num ? 'filled' : '';
  updateStats();
}

function toggleCard(i) {
  const fields = document.getElementById('cf' + i);
  if (fields) fields.classList.toggle('collapsed');
}

function applyFilters() { renderList(document.getElementById('search-input').value.toLowerCase().trim()); }

function toggleFilter() {
  showOnlyRemaining = !showOnlyRemaining;
  const btn = document.getElementById('filter-btn');
  btn.classList.toggle('active', showOnlyRemaining);
  btn.textContent = showOnlyRemaining ? '✓ Remaining' : 'Remaining';
  applyFilters();
}

function renderList(q = '') {
  const container = document.getElementById('list-container');
  let html = '<div class="cards">';
  let shown = 0;

  customers.forEach((c, i) => {
    const d = state[i] || {};
    const done = !!(d.cust_num && d.cust_num.trim());
    if (showOnlyRemaining && done) return;
    if (q && !c.name.toLowerCase().includes(q) && !c.days.toLowerCase().includes(q)) return;
    shown++;

    html += `
      <div class="card${done ? ' is-done' : ''}" id="c${i}">
        <div class="card-top" onclick="toggleCard(${i})">
          <div class="card-status">${done ? '✓' : ''}</div>
          <div class="card-info">
            <div class="card-name">${c.name}</div>
            <div class="card-days">📅 ${c.days}</div>
          </div>
          ${done ? `<div class="card-num-preview">${d.cust_num}</div>` : ''}
        </div>
        <div class="card-fields${done ? ' collapsed' : ''}" id="cf${i}">
          <div class="field-group">
            <label>Customer #</label>
            <input type="tel" inputmode="numeric" placeholder="1xxxxxx"
              value="${d.cust_num || ''}" data-field="cust_num"
              class="${d.cust_num ? 'filled' : ''}"
              oninput="saveField(${i},'cust_num',this.value)">
          </div>
          <div class="field-group">
            <label>Phone</label>
            <input type="tel" placeholder="(555) 555-5555"
              value="${d.phone || ''}"
              oninput="saveField(${i},'phone',this.value)">
          </div>
          <div class="field-group full">
            <label>Contact Person</label>
            <input type="text" placeholder="Name"
              value="${d.contact || ''}"
              oninput="saveField(${i},'contact',this.value)">
          </div>
          <div class="field-group full">
            <label>Email</label>
            <input type="email" placeholder="email@example.com"
              value="${d.email || ''}"
              oninput="saveField(${i},'email',this.value)">
          </div>
        </div>
      </div>`;
  });

  if (shown === 0) {
    html += `<div class="empty">
      <div class="empty-icon">${q ? '🔍' : '🎉'}</div>
      <h3>${q ? 'No results' : 'All done!'}</h3>
      <p>${q ? 'Try a different search.' : 'Every customer has been filled in.'}</p>
    </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

function buildCSV() {
  const lines = ['CUSTOMER NAME,CUSTOMER NUMBER,CONTACT PERSON,EMAIL,PHONE'];
  customers.forEach((c, i) => {
    const d = state[i] || {};
    if (d.cust_num || d.contact || d.email || d.phone) {
      lines.push([c.name, d.cust_num||'', d.contact||'', d.email||'', d.phone||''].join(','));
    }
  });
  return lines.join('\n');
}

function copyCSV() {
  navigator.clipboard.writeText(buildCSV()).then(() => showToast('📋 Copied to clipboard!'));
}

function emailData() {
  const filled = countFilled();
  if (!filled) { showToast('Fill in at least one customer first'); return; }
  const body = encodeURIComponent('Route 504 Customer Updates\n\n' + buildCSV());
  window.location.href = 'mailto:caleb@eaglerockstays.com?subject=Route%20504%20Customer%20Updates%20(' + filled + '%20filled)&body=' + body;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderList();
updateStats();
</script>
</body>
</html>
