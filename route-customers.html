<title>Route 504 — Customer Directory</title>
<style>

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:88px;}
  .nav{background:var(--navy);display:flex;justify-content:space-around;padding:10px 0 12px;position:sticky;top:0;z-index:101;box-shadow:0 2px 10px rgba(0,0,0,.3);}
  .nav a{color:rgba(255,255,255,.6);text-decoration:none;font-size:11px;font-weight:700;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center;}
  .nav a.active,.nav a:hover{color:var(--gold);}
  .nav a .ni{font-size:20px;}
  header{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);color:white;padding:18px 18px 14px;position:sticky;top:56px;z-index:100;box-shadow:0 4px 20px rgba(13,27,75,.35);}
  .hdr-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  header h1{font-size:19px;font-weight:900;letter-spacing:-.3px;line-height:1.2;}
  header .sub{font-size:11px;opacity:.7;margin-top:2px;}
  .hdr-badge{background:var(--gold);color:var(--navy);font-size:12px;font-weight:900;padding:4px 11px;border-radius:20px;white-space:nowrap;margin-left:10px;flex-shrink:0;}
  .prog-wrap{display:flex;align-items:center;gap:9px;}
  .prog-bg{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:10px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--gold);border-radius:10px;transition:width .4s ease;width:0;}
  .prog-lbl{font-size:11px;font-weight:700;opacity:.85;white-space:nowrap;}
  .searchbar{background:white;padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;position:sticky;top:105px;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .sw{position:relative;flex:1;}
  .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
  .searchbar input{width:100%;padding:9px 11px 9px 33px;border:2px solid var(--border);border-radius:9px;font-size:14px;background:var(--bg);color:var(--text);transition:border-color .2s;}
  .searchbar input:focus{outline:none;border-color:var(--blue);background:white;}
  .fbtn{padding:9px 12px;border:2px solid var(--border);border-radius:9px;background:var(--bg);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .fbtn.on{background:var(--blue);border-color:var(--blue);color:white;}
  .tabs{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:2px solid var(--border);background:white;color:var(--muted);transition:all .15s;flex-shrink:0;}
  .tab.on{background:var(--navy);border-color:var(--navy);color:white;}
  .cards{padding:10px 12px 0;}
  .card{background:var(--card);border-radius:14px;margin-bottom:9px;box-shadow:0 1px 6px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);overflow:hidden;transition:box-shadow .2s;}
  .card.complete{box-shadow:0 0 0 2px var(--green),0 2px 8px rgba(16,185,129,.12);}
  .card.partial{box-shadow:0 0 0 2px var(--amber),0 2px 6px rgba(245,158,11,.1);}
  .card-top{display:flex;align-items:center;padding:13px 14px;gap:10px;cursor:pointer;user-select:none;}
  .dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;transition:all .2s;border:2.5px solid var(--border);background:var(--bg);color:transparent;}
  .card.complete .dot{background:var(--green);border-color:var(--green);color:white;}
  .card.partial .dot{background:var(--amber);border-color:var(--amber);color:white;}
  .ci{flex:1;min-width:0;}
  .cn{font-size:13px;font-weight:800;line-height:1.3;}
  .cd{font-size:10px;color:var(--muted);margin-top:2px;}
  .tag-wrap{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0;}
  .tag-num{font-size:11px;font-weight:800;color:var(--blue);background:#eff6ff;padding:2px 8px;border-radius:5px;}
  .tag-miss{font-size:10px;font-weight:700;color:#dc2626;background:#fef2f2;padding:2px 8px;border-radius:5px;}
  .fields{padding:0 14px 13px;display:grid;grid-template-columns:1fr 1fr;gap:9px;border-top:1px solid var(--border);margin:0 14px;padding-top:11px;}
  .fields.hide{display:none;}
  .fg{display:flex;flex-direction:column;gap:3px;}
  .fg.full{grid-column:1/-1;}
  .fg label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
  .fg input{padding:8px 10px;border:2px solid var(--border);border-radius:7px;font-size:14px;color:var(--text);background:var(--bg);transition:all .2s;width:100%;}
  .fg input:focus{outline:none;border-color:var(--blue);background:white;box-shadow:0 0 0 3px rgba(26,58,143,.1);}
  .fg input.ok{border-color:var(--green);background:#f0fdf4;}
  .empty{text-align:center;padding:56px 24px;color:var(--muted);}
  .empty .ei{font-size:44px;margin-bottom:10px;}
  .empty h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:5px;}
  .bar{position:fixed;bottom:0;left:0;right:0;background:var(--navy);padding:10px 14px;display:flex;gap:9px;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,.3);}
  .bstat{color:rgba(255,255,255,.6);font-size:10px;font-weight:700;line-height:1.3;white-space:nowrap;}
  .bstat span{color:var(--gold);font-size:16px;font-weight:900;display:block;}
  .bbtns{display:flex;gap:7px;flex:1;justify-content:flex-end;}
  .ba{padding:9px 14px;border:none;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;}
  .ba:active{opacity:.75;}
  .bcopy{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2);}
  .bsend{background:var(--gold);color:var(--navy);}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--navy);color:white;padding:9px 18px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:360px){.fields{grid-template-columns:1fr;}.fg.full{grid-column:1;}}
</style>
</head>

let saved=JSON.parse(localStorage.getItem(SK)||'{}');
let needOnly=false,dayFilter='';
function fd(i){return saved[i]||{};}
function effVal(i,f){const d=fd(i);return d[f]!==undefined?d[f]:customers[i][f]||'';}
function isComplete(i){return !!(effVal(i,'contact')&&effVal(i,'email')&&effVal(i,'phone'));}
function isPartial(i){return !isComplete(i)&&!!(effVal(i,'contact')||effVal(i,'email')||effVal(i,'phone')||effVal(i,'num'));}
function stats(){let c=0,p=0;customers.forEach((_,i)=>{if(isComplete(i))c++;else if(isPartial(i))p++;});return{c,p,e:TOTAL-c-p};}
function updateHeader(){
  const s=stats();
  document.getElementById('sc').textContent=s.c;
  document.getElementById('sp').textContent=s.p;
  document.getElementById('se').textContent=s.e;
  const pct=(s.c/TOTAL*100).toFixed(0);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plbl').textContent=pct+'% complete';
  document.getElementById('badge').textContent=s.c+' / '+TOTAL;
}
function save(i,field,val){
  if(!saved[i])saved[i]={};
  saved[i][field]=val.trim();
  localStorage.setItem(SK,JSON.stringify(saved));
  const card=document.getElementById('c'+i);
  if(card){
    const comp=isComplete(i),part=isPartial(i);
    card.className='card'+(comp?' complete':part?' partial':'');
    card.querySelector('.dot').textContent=comp?'\u2713':part?'\u00b7':'';
    ['num','contact','email','phone'].forEach(f=>{
      const inp=card.querySelector('[data-f="'+f+'"]');
      if(inp)inp.className=effVal(i,f)?'ok':'';
    });
  }
  updateHeader();
}
function toggleCard(i){const f=document.getElementById('f'+i);if(f)f.classList.toggle('hide');}
function setDay(d){
  dayFilter=d;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+(d||'all')).classList.add('on');
  render();
}
function toggleNeed(){needOnly=!needOnly;document.getElementById('fbtn').classList.toggle('on',needOnly);render();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  let html='<div class="cards">',shown=0;
  customers.forEach((c,i)=>{
    if(needOnly&&isComplete(i))return;
    if(dayFilter&&!c.days.includes('DAY '+dayFilter))return;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.days.toLowerCase().includes(q))return;
    shown++;
    const comp=isComplete(i),part=isPartial(i);
    const cls='card'+(comp?' complete':part?' partial':'');
    const dot=comp?'\u2713':part?'\u00b7':'';
    const numV=effVal(i,'num');
    const numTag=numV?'<div class="tag-num">'+esc(numV)+'</div>':'<div class="tag-miss">No #</div>';
    html+='<div class="'+cls+'" id="c'+i+'">';
    html+='<div class="card-top" onclick="toggleCard('+i+')">';
    html+='<div class="dot">'+dot+'</div>';
    html+='<div class="ci"><div class="cn">'+esc(c.name)+'</div><div class="cd">'+esc(c.days)+'</div></div>';
    html+='<div class="tag-wrap">'+numTag+'</div></div>';
    const fHide=comp?' hide':'';
    html+='<div class="fields'+fHide+'" id="f'+i+'">';
    html+='<div class="fg"><label>Customer #</label><input type="tel" inputmode="numeric" placeholder="1xxxxxx" data-f="num" value="'+esc(effVal(i,"num"))+'" class="'+(effVal(i,"num")?"ok":"")+'" oninput="save('+i+',\'num\',this.value)"></div>';
    html+='<div class="fg"><label>Phone</label><input type="tel" placeholder="(555) 555-5555" data-f="phone" value="'+esc(effVal(i,"phone"))+'" class="'+(effVal(i,"phone")?"ok":"")+'" oninput="save('+i+',\'phone\',this.value)"></div>';
    html+='<div class="fg full"><label>Contact Person</label><input type="text" placeholder="Name" data-f="contact" value="'+esc(effVal(i,"contact"))+'" class="'+(effVal(i,"contact")?"ok":"")+'" oninput="save('+i+',\'contact\',this.value)"></div>';
    html+='<div class="fg full"><label>Email</label><input type="email" placeholder="email@example.com" data-f="email" value="'+esc(effVal(i,"email"))+'" class="'+(effVal(i,"email")?"ok":"")+'" oninput="save('+i+',\'email\',this.value)"></div>';
    html+='</div></div>';
  });
  if(!shown)html+='<div class="empty"><div class="ei">'+(q?'&#128269;':'&#127881;')+'</div><h3>'+(q?'No results':'All done!')+'</h3></div>';
  html+='</div>';
  document.getElementById('list').innerHTML=html;
}
function buildCSV(){
  const lines=['"CUSTOMER NAME","CUSTOMER NUMBER","CONTACT PERSON","EMAIL","PHONE"'];
  customers.forEach((c,i)=>{
    const num=effVal(i,'num'),contact=effVal(i,'contact'),email=effVal(i,'email'),phone=effVal(i,'phone');
    if(num||contact||email||phone)
      lines.push([c.name,num,contact,email,phone].map(v=>'"'+v.replace(/"/g,'""')+'"').join(','));
  });
  return lines.join('\n');
}
function copyCSV(){navigator.clipboard.writeText(buildCSV()).then(()=>toast('Copied!'));}
function emailMe(){
  const s=stats();
  if(s.c+s.p===0){toast('Fill in at least one customer first');return;}
  const body=encodeURIComponent('Route 504 Directory Updates\n\n'+buildCSV());
  window.location.href='mailto:caleb@eaglerockstays.com?subject=Route%20504%20Directory%20Updates&body='+body;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
