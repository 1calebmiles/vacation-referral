  header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .controls { padding: 12px 16px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .controls input { flex: 1; min-width: 160px; padding: 8px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; }
  .controls input:focus { outline: none; border-color: #1a3a8f; }
  .badge { background: #1a3a8f; color: white; border-radius: 12px; padding: 3px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .card { background: white; margin: 8px 12px; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 8px; }
  .card.done { border-left: 4px solid #10b981; opacity: 0.7; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cust-name { font-size: 15px; font-weight: 700; color: #1a202c; line-height: 1.3; }
  .cust-days { font-size: 11px; color: #718096; background: #f7fafc; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field label { display: block; font-size: 10px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .field input { width: 100%; padding: 8px 10px; border: 2px solid #e2e8f0; border-radius: 7px; font-size: 14px; }
  .field input:focus { outline: none; border-color: #1a3a8f; }
  .field.full { grid-column: 1 / -1; }
  .save-btn { width: 100%; padding: 10px; background: #1a3a8f; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .save-btn.saved { background: #10b981; }
  .spacer { height: 20px; }
  .export-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d1b4b; padding: 12px 16px; display: flex; gap: 8px; }
  .export-bar button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-email { background: #f0b429; color: #0d1b4b; }
  .btn-copy { background: rgba(255,255,255,0.15); color: white; }
  .hidden { display: none; }
  .prog { font-size: 12px; color: rgba(255,255,255,0.7); align-self: center; white-space: nowrap; }

// Load saved data
const saved = JSON.parse(localStorage.getItem('route504_cust') || '{}');

function renderCards(filter='') {
  const list = document.getElementById('card-list');
  const fl = filter.toLowerCase();
  list.innerHTML = '';
  let shown = 0, filled = 0;
  customers.forEach((c, i) => {
    const d = saved[i] || {};
    if (d.cust_num) filled++;
    if (fl && !c.name.toLowerCase().includes(fl) && !c.days.toLowerCase().includes(fl)) return;
    shown++;
    const done = !!d.cust_num;
    list.innerHTML += `
      <div class="card ${done ? 'done' : ''}" id="card-${i}">
        <div class="card-header">
          <div class="cust-name">${c.name}</div>
          <div class="cust-days">${c.days}</div>
        </div>
        <div class="fields">
          <div class="field">
            <label>Customer #</label>
            <input type="tel" placeholder="1xxxxxx" value="${d.cust_num||''}" oninput="saveField(${i},'cust_num',this.value)" id="cn-${i}">
          </div>
          <div class="field">
            <label>Phone</label>
            <input type="tel" placeholder="(555) 555-5555" value="${d.phone||''}" oninput="saveField(${i},'phone',this.value)">
          </div>
          <div class="field full">
            <label>Contact Person</label>
            <input type="text" placeholder="Name" value="${d.contact||''}" oninput="saveField(${i},'contact',this.value)">
          </div>
          <div class="field full">
            <label>Email</label>
            <input type="email" placeholder="email@example.com" value="${d.email||''}" oninput="saveField(${i},'email',this.value)">
          </div>
        </div>
      </div>`;
  });
  document.getElementById('count-badge').textContent = (131 - filled) + ' remaining';
  document.getElementById('prog-text').textContent = filled + ' filled';
}

function saveField(i, field, val) {
  if (!saved[i]) saved[i] = {};
  saved[i][field] = val.trim();
  localStorage.setItem('route504_cust', JSON.stringify(saved));
  const d = saved[i];
  const card = document.getElementById('card-' + i);
  if (card) card.className = 'card' + (d.cust_num ? ' done' : '');
  const filled = Object.values(saved).filter(x => x.cust_num).length;
  document.getElementById('count-badge').textContent = (131 - filled) + ' remaining';
  document.getElementById('prog-text').textContent = filled + ' filled';
}

function filterCards() {
  renderCards(document.getElementById('search').value);
}

function buildText() {
  const lines = ['CUSTOMER NAME,CUSTOMER NUMBER,CONTACT PERSON,EMAIL,PHONE'];
  customers.forEach((c, i) => {
    const d = saved[i] || {};
    if (d.cust_num || d.contact || d.email || d.phone) {
      lines.push(`${c.name},${d.cust_num||''},${d.contact||''},${d.email||''},${d.phone||''}`);
    }
  });
  return lines.join('\n');
}

function copyData() {
  navigator.clipboard.writeText(buildText()).then(() => alert('Copied! Paste into Claude to update the directory.'));
}

function emailData() {
  const body = encodeURIComponent(buildText());
  window.location.href = 'mailto:caleb@eaglerockstays.com?subject=Route%20504%20Customer%20Updates&body=' + body;
}
