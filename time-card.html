<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Route 504 — Time Card</title>
<style>
  :root {
    --primary-red:  #C8102E;
    --dark-red:     #8A1538;
    --coffee-brown: #4A2C1D;
    --gold:         #C8A951;
    --text-dark:    #222222;
    --text-mid:     #555555;
    --light-gray:   #F7F7F7;
    --border:       #E5E5E5;
    --white:        #FFFFFF;
    --green:        #1a9e6e;
    --card-shadow:  0 2px 16px rgba(0,0,0,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--light-gray); color:var(--text-dark); padding-bottom:20px; }

  /* NAV */
  .nav { background:white; border-bottom:3px solid var(--primary-red); display:flex; justify-content:space-around; padding:0; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px rgba(0,0,0,.12); }
  .nav a { color:#666; text-decoration:none; font-size:11px; font-weight:700; text-align:center; display:flex; flex-direction:column; align-items:center; gap:2px; padding:10px 20px 8px; border-bottom:3px solid transparent; margin-bottom:-3px; transition:all .2s; letter-spacing:.5px; text-transform:uppercase; }
  .nav a .ni { font-size:18px; }
  .nav a.active { color:var(--primary-red); border-bottom-color:var(--primary-red); }
  .nav a:hover  { color:var(--primary-red); }

  /* PAGE HEADER */
  .page-header { background:white; padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  .page-header img { height:44px; width:auto; flex-shrink:0; }
  .page-header h1 { font-size:17px; font-weight:900; color:var(--text-dark); }
  .page-header p  { font-size:11px; color:var(--text-mid); margin-top:2px; }

  /* CLOCK HERO */
  .clock-hero { background:var(--primary-red); color:white; padding:22px 20px 18px; text-align:center; }
  .live-time { font-size:52px; font-weight:900; letter-spacing:-2px; font-variant-numeric:tabular-nums; line-height:1; }
  .live-date { font-size:13px; opacity:.85; margin-top:6px; font-weight:500; }
  .month-pill { display:inline-block; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.35); color:white; font-size:12px; font-weight:700; padding:4px 14px; border-radius:20px; margin-top:10px; letter-spacing:.3px; }

  /* STATUS ROW */
  .status-row { display:grid; grid-template-columns:1fr 1fr 1fr; background:white; border-bottom:1px solid var(--border); }
  .stat-box { padding:14px 8px; text-align:center; border-right:1px solid var(--border); }
  .stat-box:last-child { border:none; }
  .stat-lbl { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:#aaa; margin-bottom:5px; }
  .stat-val { font-size:20px; font-weight:900; color:var(--text-dark); }
  .stat-val.empty { font-size:15px; color:#ddd; font-weight:400; }
  .stat-val.green { color:var(--green); }

  /* CLOCK SECTION */
  .clock-section { padding:16px; }

  /* CLOCK BUTTONS */
  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .btn-clock { padding:18px 12px; border:none; border-radius:12px; font-size:15px; font-weight:900; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:6px; letter-spacing:.3px; }
  .btn-clock:active { transform:scale(.96); }
  .btn-clock .icon { font-size:26px; }
  .btn-in  { background:var(--green); color:white; box-shadow:0 4px 16px rgba(26,158,110,.3); }
  .btn-out { background:var(--primary-red); color:white; box-shadow:0 4px 16px rgba(200,16,46,.3); }
  .btn-in:disabled, .btn-out:disabled { opacity:.3; box-shadow:none; cursor:not-allowed; transform:none; }

  .btn-submit { width:100%; padding:15px; background:var(--coffee-brown); color:white; border:none; border-radius:10px; font-size:15px; font-weight:900; cursor:pointer; margin-bottom:10px; letter-spacing:.3px; transition:opacity .15s; }
  .btn-submit:active { opacity:.8; }
  .btn-submit:disabled { opacity:.25; cursor:not-allowed; }
  .btn-reset { width:100%; padding:10px; background:transparent; color:var(--text-mid); border:1.5px solid var(--border); border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; }

  /* COMMENT */
  .comment-card { background:white; border-radius:10px; padding:14px; box-shadow:var(--card-shadow); border:1px solid var(--border); margin-bottom:14px; }
  .comment-card label { font-size:9px; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:.8px; display:block; margin-bottom:6px; }
  .comment-card textarea { width:100%; border:1.5px solid var(--border); border-radius:7px; padding:9px 11px; font-size:14px; resize:none; font-family:inherit; color:var(--text-dark); background:var(--light-gray); }
  .comment-card textarea:focus { outline:none; border-color:var(--primary-red); background:white; }

  /* HISTORY */
  .section-hdr { font-size:11px; font-weight:800; color:#aaa; text-transform:uppercase; letter-spacing:.7px; padding:16px 16px 8px; }
  .history { padding:0 16px 20px; }
  .hist-row { background:white; border-radius:9px; padding:10px 13px; margin-bottom:7px; display:grid; grid-template-columns:44px 1fr 1fr 56px; gap:8px; align-items:center; box-shadow:0 1px 6px rgba(0,0,0,.06); border:1px solid var(--border); }
  .hist-row.today { border-color:var(--primary-red); box-shadow:0 0 0 2px rgba(200,16,46,.15); }
  .hist-row.has-data { border-color:var(--green); }
  .hist-day { font-size:18px; font-weight:900; color:var(--text-dark); text-align:center; }
  .hist-dow { font-size:9px; color:var(--text-mid); text-align:center; font-weight:700; text-transform:uppercase; }
  .hist-times .ht { font-size:12px; font-weight:700; }
  .hist-times .hm { font-size:10px; color:var(--text-mid); }
  .hist-hrs { text-align:right; font-size:13px; font-weight:900; color:var(--green); }
  .hist-hrs.empty { color:#ddd; font-size:11px; font-weight:400; }

  /* TOAST */
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text-dark); color:white; padding:10px 20px; border-radius:30px; font-size:13px; font-weight:700; z-index:999; transition:transform .3s; box-shadow:0 4px 20px rgba(0,0,0,.25); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  @media(max-width:360px){ .live-time { font-size:40px; } }
</style>
</head>
<body>

<nav class="nav">
  <a href="route-customers.html"><span class="ni">📋</span>Directory</a>
  <a href="time-card.html" class="active"><span class="ni">⏱</span>Clock In/Out</a>
  <a href="time-log.html"><span class="ni">📄</span>Time Log</a>
</nav>

<div class="page-header">
  <img src="community-coffee-logo.png" alt="Community Coffee">
  <div>
    <h1>Driver's Time Card</h1>
    <p>Caleb Miles &middot; Route 504 &middot; ID 12627</p>
  </div>
</div>

<div class="clock-hero">
  <div class="live-time" id="live-time">--:-- --</div>
  <div class="live-date" id="live-date">Loading...</div>
  <div class="month-pill" id="month-badge">May 2026</div>
</div>

<div class="status-row">
  <div class="stat-box"><div class="stat-lbl">Clock In</div><div class="stat-val empty" id="disp-in">—</div></div>
  <div class="stat-box"><div class="stat-lbl">Clock Out</div><div class="stat-val empty" id="disp-out">—</div></div>
  <div class="stat-box"><div class="stat-lbl">Hours</div><div class="stat-val green empty" id="disp-hrs">—</div></div>
</div>

<div class="clock-section">
  <div class="btn-row">
    <button class="btn-clock btn-in" id="btn-in" onclick="clockIn()">
      <span class="icon">▶</span>CLOCK IN
    </button>
    <button class="btn-clock btn-out" id="btn-out" onclick="clockOut()" disabled>
      <span class="icon">■</span>CLOCK OUT
    </button>
  </div>

  <div class="comment-card">
    <label>Comments (optional)</label>
    <textarea id="comment" rows="2" placeholder="Notes for today..."></textarea>
  </div>

  <button class="btn-submit" id="btn-send" onclick="sendEntry()" disabled>Submit Today's Entry →</button>
  <button class="btn-reset" onclick="resetDay()">↺  Reset Today</button>
</div>

<div class="section-hdr" id="hist-title">May 2026 — Time Log</div>
<div class="history" id="history"></div>

<div class="toast" id="toast"></div>
<script>
const SK = 'r504_timecard_v1';
let state = JSON.parse(localStorage.getItem(SK) || '{}');

// ── Live clock ──
function tick() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  const mm = String(m).padStart(2,'0');
  const ss = String(s).padStart(2,'0');
  document.getElementById('live-time').textContent = `${hh}:${mm}:${ss} ${ampm}`;
  document.getElementById('live-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('month-badge').textContent = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('hist-title').textContent = now.toLocaleDateString('en-US',{month:'long',year:'numeric'}) + ' — Time Log';
}
setInterval(tick, 1000);
tick();

function todayKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function formatTime(date) {
  const h = date.getHours(), m = date.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h % 12 || 12;
  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

function calcHours(startStr, endStr) {
  const parse = s => {
    const [time, ampm] = s.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h * 60 + m;
  };
  try {
    let diff = parse(endStr) - parse(startStr);
    if (diff < 0) diff += 24 * 60;
    return (diff / 60).toFixed(2);
  } catch { return null; }
}

function refreshUI() {
  const key = todayKey();
  const entry = state[key] || {};
  const inTime  = entry.in  || null;
  const outTime = entry.out || null;
  const hrs = (inTime && outTime) ? calcHours(inTime, outTime) : null;

  document.getElementById('disp-in').textContent  = inTime  || '—';
  document.getElementById('disp-in').className    = 'tv' + (inTime  ? '' : ' empty');
  document.getElementById('disp-out').textContent = outTime || '—';
  document.getElementById('disp-out').className   = 'tv' + (outTime ? '' : ' empty');
  document.getElementById('disp-hrs').textContent = hrs ? hrs + ' hrs' : '—';
  document.getElementById('disp-hrs').className   = 'tv' + (hrs ? '' : ' empty');

  document.getElementById('btn-in').disabled  = !!inTime;
  document.getElementById('btn-out').disabled = !inTime || !!outTime;
  document.getElementById('btn-send').disabled = !inTime || !outTime;

  if (entry.comment) document.getElementById('comment').value = entry.comment;
  renderHistory();
}

function clockIn() {
  const key = todayKey();
  if (!state[key]) state[key] = {};
  state[key].in = formatTime(new Date());
  save();
  toast('⏱ Clocked in at ' + state[key].in);
  refreshUI();
}

function clockOut() {
  const key = todayKey();
  if (!state[key]) state[key] = {};
  state[key].out = formatTime(new Date());
  save();
  const hrs = calcHours(state[key].in, state[key].out);
  toast('✓ Clocked out — ' + hrs + ' hrs today');
  refreshUI();
}

function resetDay() {
  if (!confirm('Reset today\'s entry?')) return;
  const key = todayKey();
  delete state[key];
  document.getElementById('comment').value = '';
  save();
  refreshUI();
}

function save() {
  // Save comment too
  const key = todayKey();
  if (state[key]) state[key].comment = document.getElementById('comment').value.trim();
  localStorage.setItem(SK, JSON.stringify(state));
}

function sendEntry() {
  const key = todayKey();
  const entry = state[key] || {};
  if (!entry.in || !entry.out) { toast('Clock in and out first'); return; }
  const comment = document.getElementById('comment').value.trim();
  const hrs = calcHours(entry.in, entry.out);
  const now = new Date();
  const dateStr = key;
  const subject = encodeURIComponent('Route 504 Time Entry');
  const body = encodeURIComponent(
    `DATE: ${dateStr}\nSTART: ${entry.in}\nEND: ${entry.out}\nHOURS: ${hrs}\nCOMMENT: ${comment}`
  );
  window.location.href = `mailto:caleb@eaglerockstays.com?subject=${subject}&body=${body}`;
  // Mark as submitted
  state[key].submitted = true;
  save();
}

function renderHistory() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayKey_ = todayKey();
  const dowNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = '';
  for (let d = 1; d <= daysInMonth; d++) {
    const dObj = new Date(year, month, d);
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = state[key] || {};
    const isToday = key === todayKey_;
    const hrs = (entry.in && entry.out) ? calcHours(entry.in, entry.out) : null;
    const isWeekend = dObj.getDay() === 0 || dObj.getDay() === 6;

    html += `<div class="hist-row${isToday?' today':''}">
      <div>
        <div class="hist-day">${d}</div>
        <div class="hist-dow">${dowNames[dObj.getDay()]}</div>
      </div>
      <div class="hist-times">
        ${entry.in
          ? `<div class="ht">In: ${entry.in}</div><div class="hm">Out: ${entry.out||'—'}</div>`
          : `<div class="hm">${isWeekend ? 'Weekend' : isToday ? 'Today' : '—'}</div>`}
      </div>
      <div>
        ${entry.comment ? `<div style="font-size:11px;color:var(--muted)">${entry.comment}</div>` : ''}
      </div>
      <div class="hist-hrs${hrs?'':' empty'}">${hrs ? hrs+'h' : '—'}</div>
    </div>`;
  }
  document.getElementById('history').innerHTML = html;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

refreshUI();
</script>
</body>
</html>
